services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: knowledgebot
      POSTGRES_PASSWORD: knowledgebot
      POSTGRES_DB: knowledgebot
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledgebot"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/knowledgebot
      SPRING_DATASOURCE_USERNAME: knowledgebot
      SPRING_DATASOURCE_PASSWORD: knowledgebot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./corpus:/app/corpus:ro

volumes:
  pg-data:
