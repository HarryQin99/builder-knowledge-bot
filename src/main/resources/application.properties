spring.application.name=knowledge-bot

# --- Anthropic API ---
# Key is read from env var ANTHROPIC_API_KEY (loaded from .env — gitignored).
# Never hardcode the key in a committed file.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.chat.options.max-tokens=4096
spring.ai.anthropic.chat.options.temperature=0.0

# --- App ---
# Path to the NCC 2022 Vol 2 PDF (gitignored, drop it in corpus/ manually).
knowledgebot.corpus.path=corpus/ncc-2022-vol2.pdf
# Phase 1 baseline scope: bounded to Part H4 — Health and amenity (~9 pages,
# ~17K tokens). The full PDF is 312 pages / ~607K tokens, far over Claude's
# 200K context window — Phase 2 RAG handles the full corpus. Page numbers
# are 1-based, inclusive.
knowledgebot.corpus.page-from=117
knowledgebot.corpus.page-to=125
