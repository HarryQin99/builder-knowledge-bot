spring.application.name=knowledge-bot

# --- Model selection (Spring AI picks beans by provider name) ---
# Required because both Anthropic and OpenAI starters are on the classpath.
# We use Anthropic for chat and OpenAI only for embeddings.
spring.ai.model.chat=anthropic
spring.ai.model.embedding=openai

# --- Anthropic (chat) ---
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.chat.options.max-tokens=4096
spring.ai.anthropic.chat.options.temperature=0.0

# --- OpenAI (embeddings only) ---
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small

# --- Datasource (Postgres + pgvector) ---
# Compose injects SPRING_DATASOURCE_* env vars; defaults here are for running
# the app outside Docker against a locally started Postgres (not typical).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/knowledgebot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:knowledgebot}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:knowledgebot}

# --- pgvector store ---
# Dimensions must match the embedding model (text-embedding-3-small = 1536).
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# --- Corpus ---
# `file:` scheme resolves relative to the JVM working directory.
# In Docker: WORKDIR=/app + volume mount ./corpus:/app/corpus:ro → /app/corpus/...
# Locally: CWD=project root → ./corpus/...
# Without a scheme, Spring falls back to ServletContext resolution (webapp root), which fails.
knowledgebot.corpus.path=file:corpus/ncc-2022-vol2.pdf
